<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Book Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Simple class to hide elements */
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body class="bg-gray-100 p-8 font-sans">
    <div class="container mx-auto max-w-2xl bg-white p-6 rounded shadow">
      <!-- Authentication Area -->
      <div id="authArea" class="mb-6 p-4 border rounded bg-gray-50">
        <!-- Logged Out View -->
        <div id="loggedOutView">
          <div class="flex space-x-4">
            <!-- Signup Form -->
            <form id="signupForm" class="flex-1">
              <h3 class="text-lg font-semibold mb-2">Sign Up</h3>
              <input
                type="text"
                id="signupUsername"
                placeholder="Username"
                required
                class="w-full p-2 mb-2 border rounded"
              />
              <!-- adding show password feature -->
              <div class="relative">
                <input
                  type="password"
                  id="signupPassword"
                  placeholder="Password (min 6 chars)"
                  required
                  minlength="6"
                  class="w-full p-2 mb-2 border rounded pr-10"
                />
                <!-- Add Checkbox -->
                <label
                  for="toggleSignupPassword"
                  class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 cursor-pointer"
                >
                  <input
                    type="checkbox"
                    id="toggleSignupPassword"
                    class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                  />
                  <span class="ml-1 text-xs text-gray-600">Show</span>
                </label>
              </div>
              <button
                type="submit"
                class="w-full bg-green-500 hover:bg-green-600 text-white p-2 rounded"
              >
                Sign Up
              </button>
              <p id="signupError" class="text-red-500 text-sm mt-1"></p>
            </form>
            <!-- Login Form -->
            <form id="loginForm" class="flex-1">
              <h3 class="text-lg font-semibold mb-2">Log In</h3>
              <input
                type="text"
                id="loginUsername"
                placeholder="Username"
                required
                class="w-full p-2 mb-2 border rounded"
              />
              <!-- Add Checkbox -->
              <div class="relative">
                <input
                  type="password"
                  id="loginPassword"
                  placeholder="Password"
                  required
                  class="w-full p-2 mb-2 border rounded pr-10"
                />
                <!-- Add Checkbox -->
                <label
                  for="toggleLoginPassword"
                  class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 cursor-pointer"
                >
                  <input
                    type="checkbox"
                    id="toggleLoginPassword"
                    class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                  />
                  <span class="ml-1 text-xs text-gray-600">Show</span>
                </label>
              </div>
              <button
                type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white p-2 rounded"
              >
                Log In
              </button>
              <p id="loginError" class="text-red-500 text-sm mt-1"></p>
            </form>
          </div>
        </div>
        <!-- Logged In View -->
        <div id="loggedInView" class="hidden">
          <p class="text-lg">
            Welcome, <span id="loggedInUsername" class="font-semibold"></span>!
          </p>
          <button
            id="logoutButton"
            class="mt-2 bg-red-500 hover:bg-red-600 text-white py-1 px-3 rounded"
          >
            Log Out
          </button>
        </div>
      </div>

      <!-- Main App Content (Initially Hidden until logged in) -->
      <div id="mainContent" class="hidden">
        <h1 class="text-2xl font-bold mb-4 text-center text-gray-700">
          Find Your Next Classic Read
        </h1>

        <div class="search-area mb-6 flex">
          <input
            type="text"
            id="searchInput"
            placeholder="Search classic titles or authors..."
            class="flex-grow p-2 border border-gray-300 rounded-l focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <button
            id="searchButton"
            class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-r"
          >
            Search
          </button>
        </div>

        <!-- SEARCH RESULTS SECTION -->
        <h2 class="text-xl font-semibold mb-3 text-gray-600 border-b pb-1">
          Search Results
        </h2>
        <div
          id="resultsArea"
          class="results-area mt-4 mb-6 space-y-3 min-h-[50px]"
        >
          <p class="text-gray-500">Perform a search above.</p>
        </div>

        <!-- WANT TO READ LIST SECTION -->
        <hr class="my-6 border-t border-gray-300" />
        <h2 class="text-xl font-semibold mb-3 text-gray-600">
          My Want-to-Read List
        </h2>
        <div id="wantToReadList" class="want-list-area space-y-3">
          <p id="emptyListMessage" class="text-gray-500">
            Your list is empty. Add books from the search results!
          </p>
        </div>
      </div>
      <!-- End Main Content -->

      <!-- Loading Indicator (Optional) -->
      <div id="loadingIndicator" class="text-center p-4 hidden">Loading...</div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
